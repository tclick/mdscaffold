site_name: "python-project"
site_description: "AMBER MD simulation directory, input file, and script generator for protein/protein-ligand allostery studies"
site_author: "Timothy H. Click"
repo_url: "https://github.com/tclick/python-project"

theme:
  name: material
  features:
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src] # Instructs the parser to look inside your src/ directory
          options:
            # Tells the engine to look for NumPy-style docstring structures
            docstring_style: numpy
            # Show absolute type hint definitions
            show_type_hints: true
            # Include the source code dropdown in the documentation site
            show_source: true
            # Separate the sections cleanly
            show_root_heading: true
            show_root_full_path: false

nav:
  - Home: index.md
  - API Reference:
      - Core Engine: api/core.md
      - Interface CLI: api/cli.md
